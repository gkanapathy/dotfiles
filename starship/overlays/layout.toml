# Merged on top of `starship preset gruvbox-rainbow`: catppuccin-style tail + real line break.

format = """
[](color_orange)\
$os\
$username\
[](bg:color_yellow fg:color_orange)\
$directory\
[](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[](fg:color_aqua bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$pixi\
[](fg:color_bg3 bg:color_bg1)\
$time\
[ ](fg:color_bg1)\
$cmd_duration\
$line_break\
$character"""

[line_break]
disabled = false

[cmd_duration]
show_milliseconds = true
format = " in $duration "
style = "bg:color_bg1 fg:color_fg0"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[docker_context]
format = '[[ $symbol( $context) ](fg:color_aqua bg:color_bg3)]($style)'

[conda]
format = '[[ $symbol( $environment) ](fg:color_aqua bg:color_bg3)]($style)'

# Self-contained pill rendering of the current time, used by the right
# transient prompt (see fish/config.fish: starship_transient_rprompt_func).
# Caps reference color_bg1 so they track the active palette overlay.
[custom.time_pill]
command = 'date +%R'
when = 'true'
format = '[](fg:color_bg1)[  $output ](fg:color_fg0 bg:color_bg1)[ ](fg:color_bg1)'
